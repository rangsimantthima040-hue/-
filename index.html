/* ใส่ข้อความของนายตรงนี้ */
const messages = {
"เจน": `มึงเป็นคนดี ดีมากๆช่วยเหลือทุกคนอย่างเต็มที่ เเละมึงก็รักทุกคนเหมือนกัน 
กูขอบคุณที่ช่วยดูเเลกูมาอย่างดีไม่เเพ้ใครเลย เเละค่อยใส่ใจทุกคนอย่างดี ในอนาคตมึงอาจะเจออุปสรรคมากมาย 
เเต่กูก็เชื่อว่ามึงก็จะผ่านไปได้อย่างปลอดภัยเหมือนที่มึงรอดจนถึงตอนนี้555 เเต่ก็ช่วยๆๆกันดันกันมาจนจบเเล้วอะนะ 
ปวส.ก็คงเจอกันเเต่ก็ไม่รู้สิเป็นเรื่องของอนาคต เเต่ก็อยากเจอตลอดไม่อยากให้มึงหายไปจากกลุ่มๆนี้ ถ้าขาดมึงเเล้วใครจะดูเเลเพื่อนจริงมั้ย หยอกๆๆ 
ก็เชื่อว่าเพื่อนๆก็ไม่อยากให้มึงหายไป เเเต่พวกเราก็ปวส.ด้วยกันอะนะ มีอะไรหลังจากนี้อย่าเก็บไว้คนเดียวได้มั้ยเล่าให้เพื่อนๆที่รักเจนฟังหน่อย 
เเล้วก็ถ้าจบปวส.ก็อยากให้พวกเรามาเจอกันในคืนสู่เหย้า`,
"ฟาง": `ฟางๆๆ คนอะไรชั่งสังเกต เป็นคนดีค่อยดูเเลเพื่อนไม่ขาดตกบกพร่อง เป็นคนที่เอาใจเพื่อนกูไปได้
ในอนาคตพวกเราอาจะได้หรือไม่ได้เจอกันเเต่ ยังไงเราก็ยังเป็นเพื่อนกันไปตลอดต้องขอบคุณที่ค่อยดูเเลเราในทุกช่วงเวลา
ถ้าขาดฟางหรือคนใดคนนึ่งคงไม่อบอุ่นเท่าที่ผ่านมาการที่พวกเราทุกคนมาเจอกันนี้เเหละคือพรที่ไม่ต้องขอเเต่เป็นอะไรที่เราหาเจอด้วยตัวเอง
ตอนที่ได้เห็นข้อความคงเป็นวันปัจจิมตอนนี้ฟางเรียนจบอย่างภาคภูมิสุดๆๆในอนาคตพวกเราคงได้กลับมาเจอกันในคืนสู่เหย้านะ`,
"เดียร์": `สำหรับเดียร์ คนที่ค่อยเป็นห่วงทุกๆคน เป็นคนดีๆเเม้จะด่าเราบ่อยเพราะเราไปกวนตีน
3ปีที่ผ่านมาเป็นช่วงเวลาที่ดีมาก ขอบคุณที่ทำให้ได้เจอเดียร์ร่างทอง(ร่างเมา)555
สนุกมากที่ได้มาเจอถ้าขาดเดียร์เพื่อนสนิทเราชื่อบอมคงเสียใจเเย่
เเต่ไม่ต้องให้บอมอ่านนะจุจุเพราะสถานะเป็นไงไม่รู้555
เเต่ดูก็รู้ว่ารัก รักกันไปนานๆนะเรารู้ว่าในอนาคตเดียร์คงไปได้ดี ต้องไม่มีคงดิ เพราะไปได้ดีเเน่ๆ เพราะเดียร์จะจบเเล้วเป็นผู้ใหญ่กว่าตอนนี้อีก
ถ้ามีเรื่องร้ายๆเดียร์สามารถพึ่งคุณบอมได้เเต่ถ้ามันเกินตัวพวกคุณสองคนก็ยังมีพวกเราที่เป็นเพื่อนเสมอ
ตอนนี้เดียร์ได้เรียนจบอย่างภาคภูมิถ้าพ่อเดียร์เห็นคงภูมิใจในตัวเดียร์มากเชื่อเรา เเล้วเจอกันคืนสู่เหย้านะ`,
"มาย": `มายเป็นคนที่รักเเฟนมากๆๆ ดูจากดิวก็เห็นว่าใช่ ถ้ามีปัญหาในอนาคตก็สามารถพึ่งพาเพื่อนๆๆได้
เเล้วก็เป็นเเม่ค้าที่ดีมากๆทำงานหาเงินก็เก่งไม่เเปลกที่ดิวรักขนาดนี้
บ้างช่วงที่ทะเลอะกันก็อย่าตีกันเลยเพราะเราเห็นมายดิวมีความสุขเราก็มีความสุข
ก็พึ่งมาคุยกันจริงก็ปี3เเต่ก็เล่นเกมด้วยกันบ่อยๆเเต่ก็สนุกมาช่วงเวลา 2 ปีที่ผ่านมีค่ามาก
ขอบคุณมากต่อจากนี้ก็ขอให้โชคดีนะ เจอเเต่เรื่องทื่ดีๆ เเล้วเจอกันคืนสู่เหย้านะ`,
"มิว": `มิวๆเป็นผู้หญิงที่สวยมากๆ ใครมาพูดอะไรก็อย่าได้ไปให้ค่ามัน เพราะความสวยหรือน่ารักไม่ได้มาจากภายนอก
เเต่อยู่ที่ใจของมิว ลึกๆมิวเป็นคนที่กล้าห้าญ กล้ากว่าเราสะอีก555 เรารู้ว่ามิวจะทำได้ทุกอย่าง อย่างที่มิวคิด 
มิวเป็นตัวของมิวเอง จะไม่มีใครทำอะไรมิวได้ เเล้วก็เวลาลำบากหรือเจอเรื่องร้ายๆก็ยังมีฟาง มีเราเเล้วก็อีกหลายคนที่มิวพึ่งได้ที่นี้
เราบอกเลยว่าจะลำบากมากขนาดในทุกคนที่พร้อมช่วยจะมาหามิวเเบบฮีโรเลย คำพูดเราก็ยังดูเหมือนเด็กเเบบนี้เเหละไม่ได้โตเลย
เเต่มิว มิวพิเศษกว่านั้นเป็นคนที่มีความมั่นใจถึงจะเเอบขี้อายนิดๆเเล้วยังฉลาดมากๆ นั้นคงเป็นเสน่ห์ที่เราชอบ
มิวคงรู้ตั้งนานเเล้วเเหละ ว่าเราชอบมิวเเต่เราก็รู้ว่ามันก็เป็นไปไม่ได้ ที่เราพิมเเบบนี้เผิ่อว่าเราจะได้เจอกันอีก เลยอยากให้รู้
ถึงนะจุดนี้เราขอให้สิ่งที่มาเป็นตัวเกาะกินเเรงมิวให้หายไปเเล้วก็ขอให้มิวโชคดีมาก เเล้วเราจะได้เจอกันคืนสู่เหย้า`,
"น้ำผึ้ง": `นางสาวธันพิชา ชื่ออะไรอ่านยากๆๆ เรา2คนเคยเจอกันตั้งเเต่ปี1เเต่ตอนนั้นดูเรียบร้อยนะตอนนี้เป็นลิงเป็นค่างไม่เหมือนตอนเจอเเรกเลยๆ
เเต่ก็เป็นอะไรที่หนุกดีพวกเราไปเที่ยวด้วยกันที่ทะเลไปกินเลี้ยง เจอเรื่องเเย่ๆเหมือนกันเเล้วก็ผ่านมาได้ ผึ้งเป็นคนที่เก่งมากๆ
ภายนอกดูไม่มีอะไรเเต่ภายในนั้นใจอ่อนเหมือนนางฟ้าที่พร้อมช่วยเหลือทุกคน เป็นคนที่ขยันจนเกิ้นตัว
เรื่องช่วยเหลือจากเพื่อนก็รับน้ำใจไว้ก็ได้เพราะคำว่า เพื่อนมีไว้ช่วยเหลือกันเเละกันอย่าถ้ามีคนต้องการช่วยก็รับไว้หน่อย
หน้าเสียใจที่พวกเราต้องเเยกกันเเต่ดีใจที่ได้โตมาด้วยกันจนจบผึ้งในอนาคตจะมีเบสค่อยอยู่เคียงคู่2คนนี้ต้องค่อยซับพอลกันเเละกันนะอย่าได้ทิ้งใครคนใดคนนึ่งไว้
เพราะถ้าขาดคนใดคนนึ่งไปคงทำคนนี้เสียใจเเย่ เราเข้าใจผึ้งต้องไปทำงานด้วยเเหละเลยต้องเเยกห่างพวกเราไป เเต่ๆ 
เราจะกลับมาเจอกันในคืนสู่เหย้านะน้ำผึ้ง`,
"เบส": `นี้คือเเฟนยอดเยี่ยมเเละเป็นเพื่อนที่ดีของทุกคน คนรักเเฟนอันดับต้นๆต้องมีเบสเป็นเเน่ๆ
เราอาจจะพึ่งรู้จักกันเเค่2ปีเเต่เราก็เป็นเพื่อนที่ดีของกันเเละกัน หลังจากนี้จะเจออะไรไม่รู้บ้างเเต่ถ้าต้องการความช่วยเหลือบอกเพื่อนๆเเบบเราได้เลยนะ
เพราะพวกเราเป็นเพื่อนกันไง ไม่มีอะไรมากมาย ไม่ว่าอะไรจะซับพอลให้ถึงที่สุด วันที่ได้อ่านคงเป็นวันที่22 ตอนนั้นเบสคงจะกลับมาเต็ม100%
ไม่ต้องมาเหนื่อยทำเรื่องที่ไม่ดีต่อร่างกายเเล้วนะ เห็นว่าไปกับน้ำผึ้งไปด้วยกันเเบบนี้เลือยๆนะอย่าได้ทิ้งใครคนนึ่งไว้ช่วยกันประคองกันเเละกันดูเเลผึ้งดีๆนะ
พวกเราอยู่ห่างกันไม่มากก็จริงเเต่ก็อดเป็นห่วงพวกเองไม่ได้ ตอนนี้ก็จบเเล้วโชคดีนะเบสโตเป็นผู้ชายที่ดูเเลภีภรรยาให้ได้นะสู้ๆ เเล้วเจอกันคืนสู่เหย้านะ`,
"บาส": `บาสมึงกับกูก็อยู่ด้วยกันตั้งเเต่ทำงานที่สวนหลวงตอนนั้นก็สนุกมากๆคนอะไรไม่ทำงานจะเล่นเกมมายคราฟมอดโปเกม่อน
เเล้วดูกูโดนเด็กพ่อกับเด็กที่ไหนไม่รู้มาว่ากู 555 สนุกดึขึ้นปี2ก็ได้อยู่ห้องเดียวกัน สำหรับกูมองว่ามันคือสิ่งดีๆที่ได้วนมาเจอกัน
เเล้วมึงก็มีเเฟนตัดหน้ากูไปอีกทั้งกูโสดอีก555 เเต่ก็ธรรมดาเพื่อนกูหล่ออะนะ เเล้วก็พวกมึง2คนเหมาะสมกันมากช่วยๆกันไว้อย่าได้ทิ้งใครคนใดตนนึ่งไว้
ถ้าขาดคนไหนไปกูคงเศร้าเพราะการที่ได้เล่นได้ไปไหนมาไหนกับพวกมึง2คนเป็นเรื่องที่สนุกมากๆๆกูรู้ว่าเราได้เรียนปวส.ด้วยกันเเต่ถ้าไม่ได้เป็นเบบนั้นก็อยากให้รู้ว่ากูรักมึงไม่น้อยกว่าเพื่อนคนไหนๆๆ
กูรู้ว่าในอนาคตมึงจะเป็นสตีมเมอร์ได้เเน่ๆมึงทำให้พ่อภูมิใจมากๆๆเลยกูเชื่อเขาต้องมองกับน้องๆมึงเเน่เขาอยู่กับมึงเสมอกูรู้เราจะได้เจอกันในคืนสู่เหย้า`,
"ดิว": `มึงเป็นคนฉลาดมากๆเเล้วก็รักมายเป็นที่สุดเเล้วยังเป็นคนที่เพื่อนไว้ใจมากๆ
มึงเป็นคนดีมากเเละบ้างทีก็เเอบมีขี้เกียจเเต่ก็ขยันมากๆเหมือนกันกูดีใจที่ได้มึงเป็นเเละอยากอวยพรว่าจบปวช.3
ขอให้โชคดีกับสิ่งที่เลือกในอานาคต เเล้วกลับมาเจอกันใหม่ในคืนสู่เหย้า`,
"บอม": `บอม บอม มึงเป็นเพื่อนที่กูสนิทที่สุดตั้งเเต่ประถมเเละมึงยังคอยช่วยเหลือกูตลอดเวลาต้องกูขอบคุณมากๆ
กูดีใจมากๆที่ยังช่วยกูเรื่อยๆ ไม่รู้ว่ากูเดาถูกมั้ยว่ามึงคบกับเดียร์อยู่เเต่อยากบอกเวลาขอให้อยู่ด้วยกันนานๆกูชอบเวลาเห็นพวกมึงอยู่ด้วยกัน
ในอนาคตจะเกิดอะไรขึ้นขอให้ผ่านไปได้ทั้ง2คน ขอให้มึงโชคดีในช่วง ปวส. ขอให้โชคดีๆเเล้วกลับมาเจอกันคืนสู่เหย้า`,
"โอม": `โอมมึงเป็นเพื่อนที่ตอนปี1ค่อยอยู่เป็นเพื่อนกูตลอด ไปเล่นบาสกับกูมากินข้าวบ้านกูกับบอม
เเล้วเวลากินยังชอบดูมายเมดเนทด้วยนะสนุกดีๆ ขอบคุณมากที่ช่วยเหลือกูมาตลอด
ขอให้โชคดีกับงานกับผู้หญิงกับตรอบครัวเเละยังเจอเเต่สิ่งดีๆในอนาคต ขอให้สิ่งร้ายๆหายไป เเล้วเจอกันใหม่คืนสู่เหย้า`,
"เก้า": `มึงเป็นคนชิวมากๆๆ ชิวเกินไป ตั้งเเต่ปี1ละ ทำได้ทุกอย่างจริงๆคนนี้
หลังจากจบกูไม่รู้ว่ามึงจะทำอะไรเเต่ขอให้ประสบความสําเร็จในทุกๆครั้งที่ได้ทำอะไร
ขอให้มึงโชคดีมากเเล้วเจอกันใหม่ในคืนสู่เหย้า`,
"ไผ่": `มึงเป็นคนที่ช่วยคนอื่นได้เสมอเเต่เเอบกวนตีนไปหน่อยเเต่กูไม่ติด มึงค่อยช่วยทุกคนเท่าทีมึงทำให้
เเละยังดูเเลเพื่อนๆเสมอ เเต่จบไปไม่รู้ว่ามึงจบไปจะเรียน ปวส. ต่อรึป่าวเเต่กูขอให้มึงโชคดีกับสิ่งที่มึงเลือกนะเพื่อน
ขอให้โชคดีเเล้วกับมาเจอกันในคืนสู่เหย้า`,
"ตูน": `ตูนตูนมึงเป็นที่ดีมากๆค่อยช่วยเหลือทุกคนเท่าที่มึงจะทำได้เเต่มึงก็เป็นเพื่อนที่ตลกดีเเถมยังรักเเฟนมึงมากกก กอไก่ล้านตัว
จบไปขอให้มึงโชคดีขออะไรก็ให้เป็นจริงเเละขอให้มึงอยู๋กับพี่เเอวไปนานๆ ขอเจอสิ่งดีๆเเล้วเจอกันใหม่ในคืนสู่เหย้า`,
"คนอื่นๆ": `ไม่ต้องเสียใจไป ต่อให้ไม่มีชื่อเเต่ขอให้พวกนายโชคดีมากๆๆ
เราเชื่อว่านายจะไปได้ดีในอนาคต คิดอะไรขอให้เป็นจริง โชคดีมากๆนะ เป็นไปได้ขอให้กลับมาเจอกันคืนสู่เหย้านะทุกคน`,
};

let currentPerson="";

function showMessage(name){
    currentPerson=name;
    document.getElementById("home").style.display="none";
    document.getElementById("messagePage").style.display="block";
    document.getElementById("personName").innerText=name;
    document.getElementById("messageText").innerText=messages[name];
    document.body.style.background=backgrounds[name];

    // 🔥 ควบคุมช่องกรอกชื่อ
    if(name === "คนอื่นๆ"){
        document.getElementById("otherNameBox").style.display = "block";
    }else{
        document.getElementById("otherNameBox").style.display = "none";
    }
}

function goBack(){
    document.getElementById("home").style.display="block";
    document.getElementById("messagePage").style.display="none";
    document.body.style.background="black";
}

function sendLine(){
    let text = document.getElementById("replyText").value;

    if(text === ""){
        alert("กรุณาพิมพ์ข้อความก่อนส่ง");
        return;
    }

    let senderName = currentPerson;

    if(currentPerson === "คนอื่นๆ"){
        let other = document.getElementById("otherName").value;
        if(other === ""){
            alert("กรุณากรอกชื่อก่อน");
            return;
        }
        senderName = other;
    }

    let finalMessage = senderName + " ส่งข้อความ\n\n" + text;

    window.open("https://line.me/R/oaMessage/@451uesbu/?" + encodeURIComponent(finalMessage));
}

</script>
